<!DOCTYPE html>
<html lang="ae">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAI | Node Deployment Success</title>
    <style>
        :root {
            --bg-color: #020204;
            --glass-bg: rgba(10, 10, 18, 0.6);
            --primary: #00ffcc;
            --gradient: linear-gradient(135deg, #00ffcc 0%, #0077ff 100%);
        }
        body { margin: 0; padding: 20px; background-color: var(--bg-color); color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center; box-sizing: border-box; }
        .success-box { background: var(--glass-bg); border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 24px; padding: 60px; max-width: 550px; width: 100%; box-shadow: 0 40px 80px rgba(0,0,0,0.5); }
        .success-icon { font-size: 4rem; color: var(--primary); margin-bottom: 20px; animation: pulse 2s infinite; }
        h2 { font-size: 2.2rem; font-weight: 900; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0 0 20px 0; }
        p { color: #8f8f9d; line-height: 1.8; font-size: 1.05rem; margin-bottom: 35px; }
        .btn-home { background: var(--gradient); border: none; color: #000; padding: 15px 40px; border-radius: 30px; font-size: 0.9rem; font-weight: 700; text-decoration: none; display: inline-block; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .btn-home:hover { transform: translateY(-2px); box-shadow: 0 0 25px rgba(0, 255, 204, 0.4); }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.08); opacity: 0.8; } }
    </style>
</head>
<body>

    <div class="success-box">
        <div class="success-icon">✓</div>
        <h2>Node Status: Active</h2>
        <p style="direction: rtl;">تم استلام البيانات المخصصة بنجاح وجاري ربط بنية الذكاء الاصطناعي بخوادم شركتكم. سيتواصل معكم المدير التنفيذي مستر كيرلس البنا خلال الساعات القادمة لإتمام الفحص التقني النهائي وتشغيل الخدمة حياً 24/7.</p>
        <a href="index.html" class="btn-home">Return to Core Terminal</a>
    </div>

</body>
</html>
