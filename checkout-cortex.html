<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configure Cortex Pro Tier | NexusAutomata</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <div style="text-align: left; max-width: 700px; margin: 20px auto;">
        <a href="../index.html" style="color: var(--primary); text-decoration: none; font-weight: bold;">← Back to Main Framework</a>
    </div>

    <div class="workspace-section">
        <h2 style="color: var(--primary); margin-top: 0;">Configure Cortex Pro Node</h2>
        <div id="price-badge" class="billing-infobox" style="font-size: 1.2rem; font-weight: bold; color: #fff; text-align: center;">
            Current Retainer Balance: $1,199 / mo
        </div>

        <form id="checkout-form" onsubmit="executeDeployment(event)">
            <div class="form-group">
                <label>Company / Full Name</label>
                <input type="text" required placeholder="e.g., Prime Realty Group">
            </div>
            <div class="form-group">
                <label>Corporate Domain Email</label>
                <input type="email" required placeholder="info@company.com">
            </div>
            <div class="form-group">
                <label>WhatsApp Connected Business Phone</label>
                <input type="tel" required placeholder="+1 234 567 8900">
            </div>
            
            <div class="form-group">
                <label>Platform Node Subscription Deployment Model</label>
                <select id="billing-model" onchange="updatePricingStructure()">
                    <option value="corporate">Direct Corporate Link (Secure company card attached directly to system accounts)</option>
                    <option value="all_inclusive">All-Inclusive Bundled Invoice (We manage platform costs + overhead markup)</option>
                </select>
            </div>

            !-- حقل الكود التأسيسي التكتيكي لإغلاق أول صفقة -->
            <div class="form-group">
                <label>Founding Partner Validation Coupon</label>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="promo-input" placeholder="Enter secret code">
                    <button type="button" onclick="applyDiscountCode()" style="background: #222; color: var(--primary); border: 1px solid #333; padding: 0 20px; border-radius: 8px; cursor: pointer; font-weight: bold;">Apply</button>
                </div>
                <p id="promo-msg" style="font-size: 0.9rem; margin-top: 8px; display: none;"></p>
            </div>

            <button type="submit" class="btn-submit" id="submit-btn">Initialize Cortex Pro Pipeline ($1,199/mo)</button>
        </form>
    </div>

    <script>
        let basePrice = 1199;
        let isDiscounted = false;

        function updatePricingStructure() {
            let model = document.getElementById('billing-model').value;
            let finalPrice = isDiscounted ? 599 : basePrice;
            let badge = document.getElementById('price-badge');
            let submitBtn = document.getElementById('submit-btn');

            if (model === "all_inclusive") {
                finalPrice += 26; // إضافة مصاريف تشغيل المنصات تلقائياً أمام العميل الكسول
                badge.innerHTML = `Current Retainer Balance: $${finalPrice} / mo <br><span style="color: var(--accent-orange); font-size: 0.85rem;">($599 Retainer + $26 Platform Overhead Fees)</span>`;
            } else {
                badge.innerHTML = `Current Retainer Balance: $${finalPrice} / mo <br><span style="color: var(--primary); font-size: 0.85rem;">(Secure company card attached directly to system accounts)</span>`;
            }
            submitBtn.innerText = `Initialize Cortex Pro Pipeline ($${finalPrice}/mo)`;
        }

        function applyDiscountCode() {
            let code = document.getElementById('promo-input').value.trim().toUpperCase();
            let msg = document.getElementById('promo-msg');
            
            if (code === "FOUNDER50") {
                isDiscounted = true;
                msg.innerText = "✅ Promo code verified! Founding Partner lifetime tier unlocked at $599/mo.";
                msg.style.color = "var(--primary)";
                msg.style.display = "block";
                updatePricingStructure();
            } else {
                msg.innerText = "❌ Invalid coupon sequence.";
                msg.style.color = "red";
                msg.style.display = "block";
            }
        }

        function executeDeployment(e) {
            e.preventDefault();
            alert("Initialization Confirmed!\n\nA NexusAutomata deployment engineer will message your WhatsApp channel within minutes to finalize corporate agreements and trigger production loops!");
        }
    </script>
</body>
</html>
